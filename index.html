<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeHub - مكتبة الأكواد البرمجية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #5ADFE5;
    --primary-dark: #03C7E1;
    --secondary: #03C7E1;
    --accent: #5ADFE5;
    --bg: transparent;
    --surface: rgba(0,0,0,0.45);
    --surface2: rgba(0,0,0,0.35);
    --surface3: rgba(0,0,0,0.55);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.12);
    --glow: rgba(3,199,225,0.35);
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(202deg, #c7761a 32%, #ff7300 47%, #888888 49%, #5ADFE5 54%, #090B0F 62%, #03C7E1 63%, #000000 95%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}



/* ===== HEADER ===== */
.header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideDown {
    from { transform: translateY(-70px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.header-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center;
    gap: 16px; height: 66px;
}

.logo { display: flex; align-items: center; gap: 12px; }

.logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    box-shadow: 0 0 16px var(--glow);
    animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
    0%,100% { box-shadow: 0 0 16px var(--glow); }
    50% { box-shadow: 0 0 28px var(--glow), 0 0 45px rgba(255,85,128,0.15); }
}

.logo-text h1 {
    font-size: 1.3em; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-text p { font-size: 0.7em; color: var(--text-muted); margin-top: -1px; }

.header-right { margin-right: auto; display: flex; align-items: center; gap: 10px; }

.search-wrap { position: relative; }
.search-wrap::before {
    content: '🔍'; position: absolute;
    right: 11px; top: 50%; transform: translateY(-50%);
    font-size: 13px; pointer-events: none;
}
.search-input {
    padding: 8px 34px 8px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 13px;
    width: 200px; transition: all 0.3s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { outline: none; border-color: var(--primary); width: 240px; }

.admin-trigger {
    width: 34px; height: 34px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.25s; color: var(--text-muted);
}
.admin-trigger:hover { border-color: var(--primary); color: var(--primary); background: rgba(255,85,128,0.1); }

/* ===== HOME PAGE ===== */
#homePage {
    max-width: 900px; margin: 0 auto;
    padding: 36px 20px 60px;
    position: relative; z-index: 1;
}

.home-title {
    text-align: center; margin-bottom: 36px;
    animation: fadeUp 0.5s ease;
}

.home-title h2 {
    font-size: 1.6em; font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
}
.home-title p { color: var(--text-muted); font-size: 0.92em; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== ACCORDION ITEMS ===== */
.acc-list { display: flex; flex-direction: column; gap: 10px; }

.section-label {
    font-size: 0.8em; font-weight: 800; color: var(--text-muted);
    letter-spacing: 0.5px; padding: 4px 4px 0;
    display: flex; align-items: center; gap: 7px;
}
.section-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
}

.tool-row { cursor: pointer; }

/* بطاقة الأداة — تصميم مركزي نظيف */
.tool-row .acc-head {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px 18px 18px;
    gap: 10px;
}
.tool-row .acc-emoji {
    width: 56px; height: 56px;
    border-radius: 16px; font-size: 26px;
    margin: 0 auto;
}
.tool-row .acc-info { text-align: center; }

.tool-row .acc-meta { justify-content: center; width: 100%; }
.tool-row .acc-arrow { position: absolute; top: 12px; left: 14px; }
.tool-row { position: relative; }

.acc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px; overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.5s ease both;
}

.acc-item:nth-child(1) { animation-delay: 0.05s; }
.acc-item:nth-child(2) { animation-delay: 0.1s; }
.acc-item:nth-child(3) { animation-delay: 0.15s; }
.acc-item:nth-child(4) { animation-delay: 0.2s; }

.acc-item:hover {
    border-color: rgba(3,199,225,0.35);
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

.acc-item.open {
    border-color: rgba(3,199,225,0.4);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* Header of accordion */
.acc-head {
    padding: 18px 22px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; user-select: none;
    transition: background 0.25s;
}
.acc-head:hover { background: rgba(3,199,225,0.04); }

.acc-emoji {
    width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    transition: transform 0.3s;
}
.acc-item:hover .acc-emoji { transform: scale(1.1); }

.acc-code-icon { background: rgba(255,85,128,0.15); }
.acc-tool-icon { background: rgba(255,179,198,0.12); }

.acc-info { flex: 1; min-width: 0; }
.acc-name { font-size: 1.05em; font-weight: 700; margin-bottom: 3px; }
.acc-desc { font-size: 0.8em; color: var(--text-muted); }

.acc-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.acc-count {
    background: rgba(255,85,128,0.12);
    border: 1px solid rgba(3,199,225,0.2);
    color: var(--primary); padding: 3px 10px;
    border-radius: 20px; font-size: 0.75em; font-weight: 700;
}

.acc-arrow {
    color: var(--text-muted); font-size: 12px;
    transition: transform 0.3s;
}
.acc-item.open .acc-arrow { transform: rotate(180deg); }

/* Accordion body — mini list */
.acc-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface3);
}
.acc-item.open .acc-body { display: block; animation: fadeIn 0.25s ease; }

@keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
}

/* Items inside accordion */
.acc-entries { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }

.acc-entry {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer;
    transition: all 0.25s; position: relative; overflow: hidden;
}

.acc-entry::before {
    content: ''; position: absolute;
    top: 0; right: 0; height: 100%; width: 3px;
    background: linear-gradient(180deg, var(--primary), var(--secondary));
    opacity: 0; transition: opacity 0.25s;
}

.acc-entry:hover {
    background: rgba(255,85,128,0.1);
    border-color: rgba(3,199,225,0.35);
    transform: translateX(-3px);
}
.acc-entry:hover::before { opacity: 1; }

.entry-img {
    width: 60px; height: 40px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
    background: var(--surface3);
}

.entry-img-placeholder {
    width: 60px; height: 40px; border-radius: 8px;
    background: var(--surface3); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
}

.entry-info { flex: 1; min-width: 0; }
.entry-title { font-size: 0.92em; font-weight: 700; margin-bottom: 2px; }
.entry-desc { font-size: 0.76em; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.entry-diff {
    padding: 3px 9px; border-radius: 20px;
    font-size: 0.72em; font-weight: 700; flex-shrink: 0;
}
.beginner { background: rgba(255,179,198,0.12); color: #ffb3c6; border: 1px solid rgba(255,179,198,0.2); }
.intermediate { background: rgba(247,151,30,0.12); color: #f7971e; border: 1px solid rgba(247,151,30,0.2); }
.advanced { background: rgba(255,101,132,0.12); color: #ff6584; border: 1px solid rgba(255,101,132,0.2); }
.tool-badge { background: rgba(255,179,198,0.12); color: #ffb3c6; border: 1px solid rgba(255,179,198,0.2); }

.entry-arrow { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

/* loading / empty inside acc */
.acc-inner-loading, .acc-inner-empty {
    padding: 28px; text-align: center;
    color: var(--text-muted); font-size: 0.88em;
}
.mini-spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(3,199,225,0.2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== FULL-SCREEN VIEW ===== */
#fullView {
    position: fixed; inset: 0; z-index: 300;
    background: #090B0F;
    display: none; flex-direction: column;
    animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1);
}

#fullView.show { display: flex; }

@keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}

.fv-header {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0; z-index: 10;
}

.fv-back {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; flex-shrink: 0;
}
.fv-back:hover { border-color: var(--secondary); color: var(--secondary); background: rgba(255,101,132,0.1); }

.fv-title { font-weight: 700; font-size: 1em; }
.fv-subtitle { font-size: 0.75em; color: var(--text-muted); margin-top: 1px; }

/* CODES VIEW */
.fv-codes-body {
    flex: 1; overflow-y: auto; padding: 28px 20px;
}
.fv-codes-body::-webkit-scrollbar { width: 5px; }
.fv-codes-body::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

.codes-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
}

/* Code Card */
.code-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
    position: relative;
}
.code-card::after {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    opacity: 0; transition: opacity 0.3s;
}
.code-card:hover { transform: translateY(-4px); border-color: rgba(3,199,225,0.4); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
.code-card:hover::after { opacity: 1; }

.preview-img-wrap {
    width: 100%; aspect-ratio: 16/9;
    background: var(--surface2); overflow: hidden;
    cursor: pointer; position: relative;
}
.preview-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; display: block; }
.code-card:hover .preview-img { transform: scale(1.04); }

.preview-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(2px);
}
.preview-img-wrap:hover .preview-overlay { opacity: 1; }
.overlay-btn {
    background: rgba(204,55,122,0.85); color: white;
    padding: 8px 16px; border-radius: 9px; font-size: 0.83em; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
}

.no-img {
    width: 100%; aspect-ratio: 16/9; background: var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); gap: 6px; font-size: 0.85em;
}
.no-img span:first-child { font-size: 2em; }

.card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.code-title { font-size: 1em; font-weight: 700; color: var(--text); line-height: 1.3; }
.description { color: var(--text-muted); font-size: 0.84em; line-height: 1.6; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { background: rgba(255,85,128,0.1); color: var(--primary); padding: 3px 9px; border-radius: 20px; font-size: 0.74em; border: 1px solid rgba(255,85,128,0.18); }

.card-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 4px; }
.show-btn, .copy-btn {
    flex: 1; padding: 8px; border: none; border-radius: 9px;
    cursor: pointer; font-family: 'Cairo', sans-serif;
    font-weight: 600; font-size: 12.5px; transition: all 0.25s;
}
.show-btn { background: rgba(255,85,128,0.12); color: var(--primary); border: 1px solid rgba(108,99,255,0.25) !important; }
.show-btn:hover { background: var(--primary); color: white; border-color: transparent !important; }
.copy-btn { background: rgba(90,223,229,0.1); color: var(--accent); border: 1px solid rgba(90,223,229,0.25) !important; }
.copy-btn:hover { background: var(--accent); color: #090B0F; border-color: transparent !important; }

.code-box {
    display: none; background: var(--surface3); color: rgba(255,255,255,0.85);
    padding: 14px 16px; border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 0.78em; line-height: 1.7;
    direction: ltr; text-align: left; overflow-x: auto; max-height: 240px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
}
.code-box::-webkit-scrollbar { width: 4px; height: 4px; }
.code-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

/* TOOL VIEW */
.fv-tool-body { flex: 1; overflow: hidden; }
.fv-tool-body iframe {
    width: 100%; height: 100%; border: none;
    display: block;
}

/* ===== CODE ROW ===== */
.code-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    animation: fadeUp 0.4s ease both;
}
.code-row:hover { border-color: rgba(3,199,225,0.35); box-shadow: 0 6px 24px rgba(0,0,0,0.25); }

.code-row-img { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.entry-img-full { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
.code-row:hover .entry-img-full { transform: scale(1.03); }
.entry-no-img {
    width: 100%; height: 100%; display: flex;
    align-items: center; justify-content: center;
    font-size: 2.5em; color: var(--text-muted);
}

.code-row-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.code-row-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.code-row-title { font-size: 1em; font-weight: 700; }
.code-row-desc { font-size: 0.82em; color: var(--text-muted); line-height: 1.5; }

.code-row-actions { display: flex; gap: 8px; }
.cr-btn {
    flex: 1; padding: 8px; border-radius: 9px; border: none;
    cursor: pointer; font-family: 'Cairo', sans-serif;
    font-weight: 700; font-size: 12.5px; transition: all 0.25s;
}
.cr-show { background: rgba(255,85,128,0.12); color: var(--primary); border: 1px solid rgba(108,99,255,0.25) !important; }
.cr-show:hover { background: var(--primary); color: white; }
.cr-copy { background: rgba(90,223,229,0.1); color: var(--accent); border: 1px solid rgba(90,223,229,0.25) !important; }
.cr-copy:hover { background: var(--accent); color: #090B0F; }

.code-row-box {
    background: var(--surface3); border-top: 1px solid var(--border);
    padding: 12px 14px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.76em; line-height: 1.7; color: rgba(255,255,255,0.85);
    direction: ltr; text-align: left; overflow-x: auto;
    max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    margin: 0 -16px -14px; border-radius: 0 0 16px 16px;
}
.code-row-box::-webkit-scrollbar { width: 4px; height: 4px; }
.code-row-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
.fv-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); gap: 12px; text-align: center;
}
.fv-empty .big { font-size: 3.5em; }

/* ===== ADMIN MODAL ===== */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 500;
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(28px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal::-webkit-scrollbar { width: 5px; }
.modal::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

.modal-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
    font-size: 1.1em; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center; transition: all 0.25s;
}
.modal-close:hover { background: rgba(255,101,132,0.15); color: var(--secondary); }

.modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

/* password */
.pw-screen { text-align: center; padding: 8px 0; }
.pw-screen .lock { font-size: 2.8em; display: block; margin-bottom: 14px; }
.pw-screen h3 { font-size: 1.05em; margin-bottom: 5px; }
.pw-screen p { color: var(--text-muted); font-size: 0.85em; margin-bottom: 18px; }
.pw-input {
    width: 100%; padding: 12px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 11px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 15px;
    text-align: center; letter-spacing: 3px; transition: all 0.3s; margin-bottom: 10px;
}
.pw-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,85,128,0.12); }
.pw-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none; border-radius: 11px; color: white;
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 16px var(--glow);
}
.pw-btn:hover { transform: translateY(-2px); }
.pw-error { color: var(--secondary); font-size: 0.82em; margin-top: 7px; display: none; }

/* admin panel */
.admin-panel { display: none; }
.admin-panel.show { display: block; }

.admin-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.admin-tab {
    flex: 1; padding: 9px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface2);
    color: var(--text-muted); cursor: pointer;
    font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 12.5px;
    transition: all 0.25s; text-align: center;
}

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDDdgC3WI72Ib_GE1qK5QSlHs_lEJ-aqD0",
    authDomain: "codehub-4d5fd.firebaseapp.com",
    databaseURL: "https://codehub-4d5fd-default-rtdb.firebaseio.com",
    projectId: "codehub-4d5fd",
    storageBucket: "codehub-4d5fd.firebasestorage.app",
    messagingSenderId: "1005574781043",
    appId: "1:1005574781043:web:01098302e674dfea161206"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "codehub2024";
let currentDiff = 'beginner';
let allData = { html: [], tools: [] };

// ===== LOAD DATA =====
async function loadAll() {
    try {
        const qh = query(collection(db, 'html_cards'), orderBy('createdAt', 'desc'));
        const sh = await getDocs(qh);
        allData.html = [];
        sh.forEach(d => allData.html.push({ id: d.id, ...d.data() }));

        const qt = query(collection(db, 'tools'), orderBy('createdAt', 'desc'));
        const st = await getDocs(qt);
        allData.tools = [];
        st.forEach(d => allData.tools.push({ id: d.id, ...d.data() }));

        renderHome();
    } catch(e) {
        console.error(e);
        showToast('خطأ في التحميل', 'error');
    }
}

// ===== RENDER HOME (flat: tools then codes) =====
function renderHome() {
    const list = document.getElementById('accList');
    let html = '';

    // ── قسم الأدوات ──
    if (allData.tools.length > 0) {
        html += `<div class="section-label">🛠️ الأدوات</div>`;
        allData.tools.forEach(tool => {
            html += `
            <div class="acc-item tool-row" id="tool-row-${esc(tool.id)}" onclick="handleToolClick(this,'${esc(tool.id)}')">
                <div class="acc-head">
                    <div class="acc-emoji acc-tool-icon">${esc(tool.icon || '🛠️')}</div>
                    <div class="acc-info">
                        <div class="acc-name">${esc(tool.title)}</div>
                        <div class="acc-desc">${esc(tool.description)}</div>


                    </div>
                    <div class="acc-meta">
                        <span class="acc-count" style="background:rgba(90,223,229,0.1);border-color:rgba(90,223,229,0.2);color:#5ADFE5;">أداة</span>
                    </div>
                    <span class="acc-arrow">▼</span>
                </div>
            </div>`;
        });
    }

    // ── قسم الأكواد ──
    if (allData.html.length > 0) {
        html += `<div class="section-label" style="margin-top:${allData.tools.length>0?'28px':'0'}">🌐 أكواد جاهزة</div>`;
        allData.html.forEach(card => {
            html += buildCodeEntry(card);
        });
    }

    if (!html) {
        html = `<div style="text-align:center;padding:60px;color:var(--text-muted);">لا يوجد محتوى بعد — أضف من لوحة التحكم ⚙️</div>`;
    }

    list.innerHTML = html;
}

function buildCodeEntry(card) {
    const diffMap = { beginner:'مبتدئ', intermediate:'متوسط', advanced:'متقدم' };
    const imgHTML = card.imageUrl
        ? `<img class="entry-img-full" src="${esc(card.imageUrl)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">`
        : `<div class="entry-img-full entry-no-img">🖼️</div>`;
    return `
    <div class="code-row">
        <div class="code-row-img">${imgHTML}</div>
        <div class="code-row-body">
            <div class="code-row-top">
                <div class="code-row-title">${esc(card.title)}</div>
                <span class="entry-diff ${card.difficulty || 'beginner'}">${diffMap[card.difficulty] || 'مبتدئ'}</span>
            </div>
            <div class="code-row-desc">${esc(card.description)}</div>
            <div class="code-row-actions">
                <button class="cr-btn cr-show" onclick="toggleCodeRowBox(this, event)">👁️ عرض الكود</button>
                <button class="cr-btn cr-copy" onclick="copyCodeRow(this, event, '${esc(card.id)}')">📋 نسخ الكود</button>
            </div>
            <div class="code-row-box" style="display:none"><pre>${esc(card.code || '')}</pre></div>
        </div>
    </div>`;
}

// ===== OPEN SINGLE CODE FULL VIEW =====
window.openCodeView = function(cardId) {
    const card = allData.html.find(c => c.id === cardId);
    if (!card) return;

    const diffMap = { beginner:'مبتدئ', intermediate:'متوسط', advanced:'متقدم' };
    const tagsHTML = card.keywords
        ? card.keywords.split(',').map(k=>`<span class="tag">#${esc(k.trim())}</span>`).join('')
        : '';
    const imgHTML = card.imageUrl
        ? `<div class="preview-img-wrap" onclick="window.open('${esc(card.imageUrl)}','_blank')">
               <img class="preview-img" src="${esc(card.imageUrl)}" alt="">
               <div class="preview-overlay"><div class="overlay-btn">🔍 عرض أكبر</div></div>
           </div>`
        : `<div class="no-img"><span>🖼️</span><span>لا توجد صورة</span></div>`;

    document.getElementById('fvTitle').textContent = card.title;
    document.getElementById('fvSubtitle').textContent = 'كود ' + (diffMap[card.difficulty] || 'مبتدئ');
    document.getElementById('fvBody').innerHTML = `
        <div class="fv-codes-body">
            <div style="max-width:700px;margin:0 auto;">
                <div class="code-card" style="transform:none !important;">
                    ${imgHTML}
                    <div class="card-body">
                        <div class="card-top">
                            <span class="code-title">${esc(card.title)}</span>
                            <span class="difficulty ${card.difficulty||'beginner'}">${diffMap[card.difficulty]||'مبتدئ'}</span>
                        </div>
                        <p class="description">${esc(card.description)}</p>
                        ${tagsHTML ? `<div class="tags">${tagsHTML}</div>` : ''}
                        <div class="card-actions">
                            <button class="show-btn" onclick="toggleCodeBox(this)">👁️ عرض الكود</button>
                            <button class="copy-btn" onclick="copyCodeBox(this)">📋 نسخ الكود</button>
                        </div>
                    </div>
                    <div class="code-box"><pre>${esc(card.code)}</pre></div>
                </div>
            </div>
        </div>`;
    showFull();
};

// ===== OPEN TOOL FULL VIEW =====
window.handleToolClick = function(el, toolId) {
    el.classList.add('open');
    openTool(toolId);
};

window.openTool = function(toolId) {
    const tool = allData.tools.find(t => t.id === toolId);
    if (!tool) return;

    document.getElementById('fvTitle').textContent = (tool.icon || '🛠️') + ' ' + tool.title;
    document.getElementById('fvSubtitle').textContent = '';

    const blob = new Blob([tool.code || ''], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);

    document.getElementById('fvBody').innerHTML = `
        <div class="fv-tool-body">
            <iframe src="${blobUrl}" sandbox="allow-scripts allow-forms allow-same-origin" allowfullscreen></iframe>
        </div>`;
    showFull();
};

function showFull() {
    document.getElementById('fullView').classList.add('show');
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('footerEl').style.display = 'none';
    document.body.style.overflow = 'hidden';
}

window.closeFull = function() {
    document.getElementById('fullView').classList.remove('show');
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('footerEl').style.display = 'block';
    document.body.style.overflow = '';
    document.getElementById('fvBody').innerHTML = '';
    document.querySelectorAll('.tool-row').forEach(t => t.classList.remove('open'));
};

// ===== CODE ROW BUTTONS =====
window.toggleCodeRowBox = function(btn, e) {
    e.stopPropagation();
    const box = btn.closest('.code-row').querySelector('.code-row-box');
    const open = box.style.display === 'block';
    box.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '👁️ عرض الكود' : '🙈 إخفاء الكود';
};

window.copyCodeRow = function(btn, e, cardId) {
    e.stopPropagation();
    const card = allData.html.find(c => c.id === cardId);
    if (!card) return;
    navigator.clipboard.writeText((card.code || '').trim()).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✅ تم النسخ!';
        setTimeout(() => btn.textContent = orig, 2200);
    });
};
window.toggleCodeBox = function(btn) {
    const box = btn.closest('.code-card').querySelector('.code-box');
    const open = box.style.display === 'block';
    box.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '👁️ عرض الكود' : '🙈 إخفاء الكود';
};

window.copyCodeBox = function(btn) {
    const box = btn.closest('.code-card').querySelector('.code-box');
    const code = box.querySelector('pre')?.textContent || box.textContent;
    navigator.clipboard.writeText(code.trim()).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✅ تم النسخ!';
        setTimeout(() => btn.textContent = orig, 2200);
    });
};

// ===== SEARCH =====
window.searchCards = function(q) {
    const term = q.toLowerCase();
    document.querySelectorAll('.acc-item').forEach(item => {
        const txt = item.textContent.toLowerCase();
        item.style.display = (!term || txt.includes(term)) ? '' : 'none';
    });
    document.querySelectorAll('.section-label').forEach(label => {
        // أخفِ العنوان لو كل العناصر بعده مخفية
        let next = label.nextElementSibling;
        let anyVisible = false;
        while (next && !next.classList.contains('section-label')) {
            if (next.style.display !== 'none') anyVisible = true;
            next = next.nextElementSibling;
        }
        label.style.display = anyVisible ? '' : 'none';
    });
};

// ===== ADMIN MODAL =====
window.openAdminModal = function() {
    document.getElementById('adminModal').classList.add('open');
    document.getElementById('pwScreen').style.display = 'block';
    document.getElementById('adminPanel').classList.remove('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    setTimeout(() => document.getElementById('pwInput').focus(), 300);
};
window.closeAdminModal = function() { document.getElementById('adminModal').classList.remove('open'); };
document.getElementById('adminModal').addEventListener('click', e => { if(e.target===document.getElementById('adminModal')) closeAdminModal(); });

window.checkPassword = function() {
    if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
        document.getElementById('pwScreen').style.display = 'none';
        document.getElementById('adminPanel').classList.add('show');
        document.getElementById('modalTitle').textContent = '⚙️ لوحة التحكم';
    } else {
        document.getElementById('pwError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
};

window.selDiff = function(el) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel');
    currentDiff = el.dataset.d;
};

window.previewModalImg = function(url) {
    const box = document.getElementById('modalImgPreview');
    const img = document.getElementById('modalImgEl');
    if (!url) { box.style.display='none'; return; }
    img.src = url;
    img.onload = () => box.style.display = 'block';
    img.onerror = () => box.style.display = 'none';
};

window.switchAdminTab = function(tab, el) {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.getElementById('admin-' + tab).classList.add('active');
    if (tab === 'manage') loadManageList();
};

// ===== ADD CARD =====
window.addCard = async function() {
    const title = document.getElementById('a-title').value.trim();
    const desc = document.getElementById('a-desc').value.trim();
    const keys = document.getElementById('a-keys').value.trim();
    const img = document.getElementById('a-img').value.trim();
    const code = document.getElementById('a-code').value.trim();

    if (!title || !desc || !code || !img) { showToast('ملأ جميع الحقول المطلوبة ⚠️','error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="mini-spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div>';

    try {
        await addDoc(collection(db,'html_cards'), { title, description:desc, keywords:keys, imageUrl:img, code, difficulty:currentDiff, createdAt:Date.now() });
        ['a-title','a-desc','a-keys','a-img','a-code'].forEach(id => document.getElementById(id).value='');
        document.getElementById('modalImgPreview').style.display='none';
        await loadAll();
        showToast('تم حفظ الكارت! 🎉','success');
        closeAdminModal();
    } catch(e) { showToast('خطأ: '+e.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML='<span>💾 حفظ الكارت</span>'; }
};

// ===== MANAGE LIST =====
window.loadManageList = async function() {
    const type = document.getElementById('manage-filter').value;
    const list = document.getElementById('adminCardsList');
    const items = allData[type] || [];

    if (items.length === 0) { list.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:24px;">لا يوجد عناصر بعد</div>'; return; }

    list.innerHTML = items.map(item => `
        <div class="admin-card-item">
            <div>
                <div class="admin-card-title">${esc(item.title)}</div>
                <div class="admin-card-meta">${type==='tools' ? (item.icon||'🛠️')+' أداة' : (item.difficulty==='beginner'?'🟢 مبتدئ':item.difficulty==='intermediate'?'🟡 متوسط':'🔴 متقدم')}</div>
            </div>
            <button class="delete-btn" onclick="deleteItem('${type}','${item.id}')">🗑️ حذف</button>
        </div>`).join('');
};

window.deleteItem = async function(type, id) {
    if (!confirm('هتحذف العنصر ده؟')) return;
    const coll = type==='tools' ? 'tools' : 'html_cards';
    try {
        await deleteDoc(doc(db, coll, id));
        await loadAll();
        loadManageList();
        showToast('تم الحذف ✅','success');
    } catch(e) { showToast('خطأ في الحذف','error'); }
};

// ===== TOAST =====
let toastTimer;
window.showToast = function(msg, type='info') {
    clearTimeout(toastTimer);
    const t = document.getElementById('toast');
    document.getElementById('toastIcon').textContent = type==='success'?'✅':type==='error'?'❌':'ℹ️';
    document.getElementById('toastMsg').textContent = msg;
    t.className = 'toast '+type+' show';
    toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
};
